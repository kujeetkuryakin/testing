<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>

    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- External stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Container -->
    <main class="app-container">

        <!-- PAGE 1: The Question -->
        <section id="page-1" class="page active">
            <div class="card-content">
                <h1 class="heading-page1">Meskipun terlambat, selamat atas ulang tahunmu</h1>
                <div class="button-group">
                    <!-- Button 'gak' (will escape mouse/touch) -->
                    <button id="btn-no" class="btn btn-secondary">gak, ckptw</button>
                    <!-- Button 'iya' (transitions to page 2) -->
                    <button id="btn-yes" class="btn btn-primary">iya, gpp sun</button>
                </div>
            </div>
        </section>

        <!-- PAGE 2: The Gallery & Message -->
        <section id="page-2" class="page hidden">
            <!-- Dark glassmorphism overlay on top of the background -->
            <div class="overlay"></div>

            <div class="gallery-container">
                <!-- Infinite horizontal sliding photo container -->
                <div class="slider-wrapper">
                    <div id="photo-slider" class="slider-track">
                        <!-- Photos will be dynamically inserted here by JavaScript -->
                    </div>
                </div>

                <!-- Bottom message overlay -->
                <div class="message-box">
                    <p class="text-sub">you've worked so hard this year</p>
                    <h2 class="text-main">im so motherfather proud for everything youve done</h2>
                </div>
            </div>

            <!-- Optional: Ambient audio player controller -->
            <div class="audio-control" id="audio-toggle" title="Putar Musik Latar">
                <svg class="icon-play" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M8 5v14l11-7z" />
                </svg>
                <svg class="icon-pause hidden" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
                <span class="audio-label">Music</span>
            </div>
            <audio id="bg-music" loop>
                <!-- User can replace this source with any MP3 of their choice -->
                <source src="song.mp3" type="audio/mpeg">
            </audio>
        </section>

    </main>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>

</html>
